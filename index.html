<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>簡易積木編譯器</title>

<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  font-family: sans-serif;
  background: #0f172a;
  color: white;
}

.panel {
  flex: 1;
  padding: 10px;
}

.left {
  background: #1e293b;
}

.right {
  background: #020617;
}

.block {
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  cursor: grab;
}

.print { background: #38bdf8; }
.repeat { background: #f59e0b; }

.workspace {
  min-height: 300px;
  border: 2px dashed #334155;
  padding: 10px;
}

button {
  margin-top: 10px;
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.output {
  margin-top: 10px;
  background: black;
  padding: 10px;
  height: 120px;
  overflow: auto;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- 左：積木 -->
<div class="panel left">
  <h3>積木區</h3>

  <div class="block print" draggable="true" data-type="print">
    輸出文字
  </div>

  <div class="block repeat" draggable="true" data-type="repeat">
    重複 5 次
  </div>
</div>

<!-- 右：工作區 -->
<div class="panel right">
  <h3>編輯區</h3>

  <div class="workspace" id="workspace"></div>

  <button onclick="compile()">編譯</button>
  <button onclick="run()">執行</button>

  <div class="output" id="code"></div>
</div>

<script>
const workspace = document.getElementById("workspace");

// 拖拉開始
document.querySelectorAll(".block").forEach(block => {
  block.addEventListener("dragstart", e => {
    e.dataTransfer.setData("type", block.dataset.type);
  });
});

// 放進工作區
workspace.addEventListener("dragover", e => e.preventDefault());

workspace.addEventListener("drop", e => {
  e.preventDefault();
  const type = e.dataTransfer.getData("type");

  let el = document.createElement("div");
  el.className = "block";
  el.draggable = true;

  if (type === "print") {
    el.textContent = "輸出 Hello";
    el.dataset.type = "print";
  }

  if (type === "repeat") {
    el.textContent = "重複 5 次";
    el.dataset.type = "repeat";
  }

  workspace.appendChild(el);
});

// 編譯
function compile() {
  let code = "";

  const blocks = workspace.children;

  for (let b of blocks) {
    if (b.dataset.type === "print") {
      code += 'console.log("Hello");\n';
    }

    if (b.dataset.type === "repeat") {
      code += 'for(let i=0;i<5;i++){console.log("loop");}\n';
    }
  }

  document.getElementById("code").innerText = code;
}

// 執行
function run() {
  const code = document.getElementById("code").innerText;
  try {
    eval(code);
  } catch (e) {
    alert("錯誤：" + e);
  }
}
</script>

</body>
</html>
